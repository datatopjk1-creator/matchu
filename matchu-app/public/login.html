<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk | Matchu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{ --primary:#7A2236; --bg:#F8F5F2; --muted:#6B7280; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Inter',sans-serif; background:var(--bg); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
.card{ width:100%; max-width:500px; background:white; padding:50px; border-radius:28px; box-shadow:0 20px 40px rgba(0,0,0,.05); }
.logo{ text-align:center; font-family:'Playfair Display',serif; font-size:56px; color:var(--primary); margin-bottom:6px; }
.tagline{ text-align:center; color:var(--primary); font-style:italic; font-size:13px; margin-bottom:8px; }
.desc{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:35px; }
.form-group{ margin-bottom:20px; }
label{ display:block; margin-bottom:8px; font-weight:600; font-size:14px; }
input{ width:100%; padding:14px; border:1.5px solid #ddd; border-radius:12px; font-size:15px; font-family:'Inter',sans-serif; transition:.2s; }
input:focus{ outline:none; border-color:var(--primary); }
.err{ color:#e53e3e; font-size:13px; margin-top:10px; min-height:18px; text-align:center; }
.btn{ width:100%; padding:16px; background:var(--primary); color:white; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; margin-top:10px; font-family:'Inter',sans-serif; transition:.2s; }
.btn:hover{ opacity:.9; }
.btn:disabled{ opacity:.6; cursor:not-allowed; }
.divider{ text-align:center; color:var(--muted); font-size:13px; margin:20px 0; }
.register-link{ text-align:center; margin-top:16px; font-size:14px; color:var(--muted); }
.register-link a{ color:var(--primary); text-decoration:none; font-weight:600; }
.hint{ font-size:12px; color:var(--muted); margin-top:5px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">MATCHU</div>
  <div class="tagline">Beyond Matching. Toward Marriage.</div>
  <div class="desc">Masuk ke akun Matchu kamu</div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email atau Nama Panggilan</label>
      <input type="text" id="identifier" placeholder="email@kamu.com atau nama_panggilan" autocomplete="username" required>
      <div class="hint">Bisa login pakai email atau nama panggilan yang didaftarkan</div>
    </div>
    <div class="form-group">
      <label>Kata Sandi</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <div class="err" id="errMsg"></div>
    <button type="submit" class="btn" id="btnSubmit">Masuk</button>
  </form>

  <div class="register-link">
    Belum punya akun? <a href="register.html">Daftar sekarang</a>
  </div>
</div>

<script>
// Jika sudah login, langsung ke dashboard
const existingId = localStorage.getItem('matchu_user_id');
if (existingId) window.location.href = 'dashboard.html';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn      = document.getElementById('btnSubmit');
  const errMsg   = document.getElementById('errMsg');
  const identifier = document.getElementById('identifier').value.trim();
  const password   = document.getElementById('password').value;

  errMsg.textContent = '';

  if (!identifier || !password) {
    errMsg.textContent = 'Email/username dan password wajib diisi.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Memproses...';

  try {
    const res  = await fetch('/api/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ identifier, password }),
    });

    const data = await res.json();
    console.log('LOGIN RESPONSE:', data); 

    if (data.success) {
    localStorage.setItem('matchu_user_id', data.userId);
    localStorage.setItem('matchu_token',   data.access_token  || '');
    localStorage.setItem('matchu_refresh',  data.refresh_token || '');
    localStorage.setItem('matchu_user', JSON.stringify({
      userId:         data.userId,
      email:          data.email,
      nama:           data.nama,
      nama_panggilan: data.nama_panggilan,
      trust_score:    data.trust_score,
      foto_url_1:     data.foto_url_1,
      isAdmin:        data.isAdmin || false,
      adminRole:      data.adminRole || null,
    }));

    // ✅ Redirect sesuai role
    if (data.isAdmin) {
      window.location.href = 'admin-dashboard.html';
    } else {
    window.location.href = 'dashboard.html';
  }
} else {
      errMsg.textContent = data.error || 'Email/username atau password salah.';
      btn.disabled = false;
      btn.textContent = 'Masuk';
    }
  } catch (err) {
    errMsg.textContent = 'Gagal terhubung ke server. Coba lagi.';
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
});
</script>
</body>
</html>
