<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Email | Matchu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{ --primary:#7A2236; --bg:#F8F5F2; --muted:#6B7280; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Inter',sans-serif; background:var(--bg); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
.card{ width:100%; max-width:480px; background:white; border-radius:28px; padding:48px 40px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.05); }
.logo{ font-family:'Playfair Display',serif; font-size:52px; color:var(--primary); margin-bottom:6px; }
.tagline{ color:var(--primary); font-style:italic; font-size:13px; margin-bottom:28px; }
.step{ color:var(--primary); font-weight:600; font-size:12px; margin-bottom:8px; }
.progress-bar{ width:100%; height:6px; background:#eee; border-radius:20px; margin-bottom:28px; overflow:hidden; }
.progress-fill{ width:25%; height:100%; background:var(--primary); border-radius:20px; }
.title{ font-family:'Playfair Display',serif; font-size:26px; margin-bottom:10px; }
.desc{ color:var(--muted); font-size:14px; line-height:1.7; margin-bottom:20px; }
.email-box{ background:#f9f4f5; padding:12px 18px; border-radius:10px; margin-bottom:24px; font-weight:600; color:var(--primary); font-size:14px; }
.otp-wrap{ display:flex; justify-content:center; gap:10px; margin-bottom:8px; }
.otp{ width:50px; height:54px; border:1.5px solid #ddd; border-radius:11px; text-align:center; font-size:22px; font-weight:700; font-family:'Inter',sans-serif; color:var(--primary); outline:none; transition:.2s; }
.otp:focus{ border-color:var(--primary); background:#fdf9f9; }
.otp.filled{ border-color:var(--primary); background:#f9f4f5; }
.err-otp{ color:#e53e3e; font-size:13px; margin-bottom:12px; min-height:18px; }
.btn{ width:100%; padding:14px; border:none; border-radius:12px; background:var(--primary); color:white; font-size:15px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:.2s; }
.btn:disabled{ opacity:.6; cursor:not-allowed; }
.resend-wrap{ margin-top:16px; font-size:13px; color:var(--muted); }
.resend-btn{ background:none; border:none; color:var(--primary); font-weight:600; cursor:pointer; font-size:13px; font-family:'Inter',sans-serif; }
.resend-btn:disabled{ color:var(--muted); cursor:not-allowed; }
.note{ margin-top:12px; color:#999; font-size:12px; }
.back-link{ display:block; margin-top:16px; color:var(--muted); font-size:13px; }
.back-link a{ color:var(--primary); text-decoration:none; font-weight:600; }
@media(max-width:480px){ .card{ padding:32px 20px; } .logo{ font-size:38px; } .otp{ width:44px; height:48px; font-size:18px; } .otp-wrap{ gap:7px; } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">MATCHU</div>
  <div class="tagline">Beyond Matching. Toward Marriage.</div>
  <div class="step">LANGKAH 1 DARI 4 — Verifikasi Email</div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
  <div class="title">Masukkan Kode OTP</div>
  <div class="desc">Kode verifikasi 6 digit telah dikirim ke:</div>
  <div class="email-box" id="email-display">memuat...</div>
  <div class="otp-wrap">
    <input class="otp" maxlength="1" type="text" inputmode="numeric">
    <input class="otp" maxlength="1" type="text" inputmode="numeric">
    <input class="otp" maxlength="1" type="text" inputmode="numeric">
    <input class="otp" maxlength="1" type="text" inputmode="numeric">
    <input class="otp" maxlength="1" type="text" inputmode="numeric">
    <input class="otp" maxlength="1" type="text" inputmode="numeric">
  </div>
  <div class="err-otp" id="otp-err"></div>
  <button class="btn" id="btn-verify" onclick="verifyOTP()">Verifikasi Email</button>
  <div class="resend-wrap">
    Tidak menerima kode?
    <button class="resend-btn" id="resend-btn" onclick="resendOTP()" disabled>Kirim Ulang</button>
    <span id="timer-wrap">(<span id="countdown">60</span>s)</span>
  </div>
  <div class="note">Kode berlaku 10 menit.</div>
  <div class="back-link"><a href="register.html">Kembali & ganti email</a></div>
</div>
<script>
const userData = JSON.parse(localStorage.getItem('matchu_user') || '{}');
const email = userData.email || '';
if (!email) { alert('Sesi tidak ditemukan.'); window.location.href = 'register.html'; }
document.getElementById('email-display').textContent = email;

const inputs = document.querySelectorAll('.otp');
inputs.forEach((input, idx) => {
  input.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    if (this.value) { this.classList.add('filled'); if (idx < 5) inputs[idx+1].focus(); }
    else this.classList.remove('filled');
    document.getElementById('otp-err').textContent = '';
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && idx > 0) {
      inputs[idx-1].focus(); inputs[idx-1].value = ''; inputs[idx-1].classList.remove('filled');
    }
  });
  input.addEventListener('paste', function(e) {
    e.preventDefault();
    const p = (e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'');
    [...p].slice(0,6).forEach((c,i) => { if(inputs[i]){ inputs[i].value=c; inputs[i].classList.add('filled'); } });
    inputs[Math.min(p.length,5)].focus();
  });
});
inputs[0].focus();

async function verifyOTP() {
  const otp = [...inputs].map(i=>i.value).join('');
  if (otp.length < 6) { document.getElementById('otp-err').textContent = 'Masukkan 6 digit OTP.'; return; }
  const btn = document.getElementById('btn-verify');
  btn.disabled = true; btn.textContent = 'Memverifikasi...';
  try {
    const r1 = await fetch('/api/verify-otp', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,otp}) });
    const d1 = await r1.json();
    if (!d1.success) {
      document.getElementById('otp-err').textContent = d1.message || 'OTP tidak valid.';
      inputs.forEach(i=>{i.value='';i.classList.remove('filled');}); inputs[0].focus();
      btn.disabled=false; btn.textContent='Verifikasi Email'; return;
    }
    // OTP valid — lanjut ke verifikasi pendidikan
    window.location.href = 'verify-education.html';
  } catch {
    document.getElementById('otp-err').textContent = 'Gagal terhubung ke server.';
    btn.disabled=false; btn.textContent='Verifikasi Email';
  }
}

let cdInterval;
function startCountdown() {
  let s=60; document.getElementById('timer-wrap').style.display='inline';
  document.getElementById('resend-btn').disabled=true;
  document.getElementById('countdown').textContent=s;
  clearInterval(cdInterval);
  cdInterval = setInterval(()=>{ s--; document.getElementById('countdown').textContent=s;
    if(s<=0){ clearInterval(cdInterval); document.getElementById('timer-wrap').style.display='none'; document.getElementById('resend-btn').disabled=false; }
  },1000);
}
startCountdown();

async function resendOTP() {
  document.getElementById('resend-btn').disabled=true;
  try {
    const r = await fetch('/api/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d = await r.json();
    if(d.success){ inputs.forEach(i=>{i.value='';i.classList.remove('filled');}); inputs[0].focus(); startCountdown(); }
    else { alert('Gagal kirim ulang.'); document.getElementById('resend-btn').disabled=false; }
  } catch { alert('Gagal terhubung.'); document.getElementById('resend-btn').disabled=false; }
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter') verifyOTP(); });
</script>
</body>
</html>
