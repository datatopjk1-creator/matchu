<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Email | Matchu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{ --primary:#7A2236; --bg:#F8F5F2; --muted:#6B7280; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Inter',sans-serif; background:var(--bg); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
.card{ width:100%; max-width:550px; background:white; border-radius:30px; padding:55px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.05); }
.logo{ font-family:'Playfair Display',serif; font-size:56px; color:var(--primary); margin-bottom:8px; }
.tagline{ color:var(--primary); font-style:italic; margin-bottom:35px; }
.icon{ font-size:60px; margin-bottom:20px; }
.title{ font-family:'Playfair Display',serif; font-size:34px; margin-bottom:12px; }
.desc{ color:var(--muted); line-height:1.8; margin-bottom:25px; }
.email-box{ background:#f9f4f5; padding:15px 20px; border-radius:14px; margin-bottom:28px; font-weight:600; color:var(--primary); }
.otp-container{ display:flex; justify-content:center; gap:10px; margin-bottom:28px; }
.otp{ width:54px; height:60px; border:2px solid #ddd; border-radius:14px; text-align:center; font-size:24px; font-weight:700; font-family:'Inter',sans-serif; transition:.2s; }
.otp:focus{ outline:none; border-color:var(--primary); }
.err-msg{ color:#e53e3e; font-size:14px; margin-bottom:15px; display:none; background:#fff5f5; padding:12px; border-radius:10px; }
.btn{ width:100%; padding:16px; border:none; border-radius:14px; background:var(--primary); color:white; font-size:16px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:.2s; }
.btn:hover{ opacity:.9; }
.btn:disabled{ opacity:.6; cursor:not-allowed; }
.resend{ display:inline-block; margin-top:18px; color:var(--primary); font-weight:600; cursor:pointer; background:none; border:none; font-size:15px; font-family:'Inter',sans-serif; }
.resend:disabled{ opacity:.5; cursor:not-allowed; }
.note{ margin-top:15px; color:#999; font-size:13px; }
.countdown{ color:var(--primary); font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">MATCHU</div>
  <div class="tagline">Beyond Matching. Toward Marriage.</div>
  <div class="icon">📧</div>
  <div class="title">Verifikasi Email</div>
  <div class="desc">Kode verifikasi 6 digit telah dikirim ke email kamu. Masukkan kode untuk melanjutkan pendaftaran.</div>

  <div class="email-box" id="email-display">memuat...</div>

  <div class="otp-container">
    <input class="otp" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
    <input class="otp" maxlength="1" inputmode="numeric">
    <input class="otp" maxlength="1" inputmode="numeric">
    <input class="otp" maxlength="1" inputmode="numeric">
    <input class="otp" maxlength="1" inputmode="numeric">
    <input class="otp" maxlength="1" inputmode="numeric">
  </div>

  <div class="err-msg" id="err-msg"></div>

  <button class="btn" id="btn-verify" onclick="verifyOTP()">Verifikasi Email</button>

  <br>
  <button class="resend" id="btn-resend" onclick="resendOTP()">
    Kirim Ulang Kode <span class="countdown" id="countdown"></span>
  </button>
  <div class="note">Kode berlaku selama 10 menit.</div>
</div>

<script>
  // ── Ambil data dari localStorage ─────────────────────────────────────────
  const userData = JSON.parse(localStorage.getItem('matchu_user') || '{}');

  if (!userData.email) {
    alert('Sesi tidak ditemukan. Silakan daftar ulang.');
    window.location.href = 'register.html';
  }

  document.getElementById('email-display').textContent = userData.email;

  // ── OTP input behaviour ──────────────────────────────────────────────────
  const otpInputs = document.querySelectorAll('.otp');

  otpInputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '');
      if (input.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) otpInputs[i - 1].focus();
    });
    // Paste seluruh kode sekaligus
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const digits = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      digits.split('').forEach((ch, idx) => { if (otpInputs[idx]) otpInputs[idx].value = ch; });
      const last = otpInputs[Math.min(digits.length, 5)];
      if (last) last.focus();
    });
  });

  function getCode() {
    return Array.from(otpInputs).map(i => i.value).join('');
  }

  function showErr(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideErr() {
    document.getElementById('err-msg').style.display = 'none';
  }

  // ── Verifikasi OTP → lalu complete-register ──────────────────────────────
  async function verifyOTP() {
    hideErr();
    const code = getCode();
    if (code.length !== 6) { showErr('Masukkan 6 digit kode verifikasi.'); return; }

    const btn = document.getElementById('btn-verify');
    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';

    try {
      // Langkah 1: verifikasi OTP ke tabel email_otps
      const resOTP = await fetch('/api/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userData.email, otp: code }),
      });
      const dataOTP = await resOTP.json();

      if (!dataOTP.success) {
        showErr(dataOTP.message || 'Kode salah atau sudah kadaluarsa.');
        btn.disabled = false;
        btn.textContent = 'Verifikasi Email';
        return;
      }

      btn.textContent = 'Mendaftarkan akun...';

      // Langkah 2: daftarkan user ke Supabase Auth + tabel users
      const resReg = await fetch('/api/complete-register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nama:           userData.nama,
          nama_panggilan: userData.nama_panggilan,
          email:          userData.email,
          password:       userData.password,        // ← dari localStorage sementara
          tanggal_lahir:  userData.tanggal_lahir,
          jenis_kelamin:  userData.jenis_kelamin,
        }),
      });
      const dataReg = await resReg.json();

      if (!dataReg.success) {
        showErr(dataReg.error || 'Gagal mendaftarkan akun.');
        btn.disabled = false;
        btn.textContent = 'Verifikasi Email';
        return;
      }

      // Berhasil — bersihkan data sementara, simpan user id
      localStorage.setItem('matchu_user_id', dataReg.userId);
      localStorage.removeItem('matchu_user');   // hapus data sensitif

      // Lanjut ke halaman berikutnya (lengkapi profil / dashboard)
      window.location.href = 'complete-profile.html';

    } catch (err) {
      showErr('Gagal terhubung ke server. Coba lagi.');
      btn.disabled = false;
      btn.textContent = 'Verifikasi Email';
    }
  }

  // ── Kirim ulang OTP dengan cooldown 60 detik ─────────────────────────────
  let cooldown = 0;
  let timer = null;

  async function resendOTP() {
    if (cooldown > 0) return;

    const btn = document.getElementById('btn-resend');
    btn.disabled = true;

    try {
      const res = await fetch('/api/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userData.email }),
      });
      const data = await res.json();

      if (data.success) {
        startCooldown(60);
      } else {
        alert(data.error || 'Gagal kirim ulang.');
        btn.disabled = false;
      }
    } catch {
      alert('Gagal terhubung ke server.');
      btn.disabled = false;
    }
  }

  function startCooldown(seconds) {
    cooldown = seconds;
    const btn    = document.getElementById('btn-resend');
    const ctdown = document.getElementById('countdown');

    clearInterval(timer);
    timer = setInterval(() => {
      cooldown--;
      ctdown.textContent = cooldown > 0 ? `(${cooldown}s)` : '';
      if (cooldown <= 0) {
        clearInterval(timer);
        btn.disabled = false;
      }
    }, 1000);
  }
</script>
</body>
</html>
