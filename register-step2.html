<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matchu - Profile Setup</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#7A2236;
    --bg:#F8F5F2;
    --card:#ffffff;
    --text:#222;
    --muted:#6b7280;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
}

.container{

    max-width:700px;

    margin:60px auto;

    padding:0 20px;
}

.card{

    background:white;

    padding:50px;

    border-radius:28px;

    box-shadow:0 20px 40px rgba(0,0,0,.05);
}

.logo{

    text-align:center;

    font-family:'Playfair Display',serif;

    font-size:58px;

    color:var(--primary);

    margin-bottom:10px;
}

.step{

    text-align:center;

    color:var(--primary);

    margin-bottom:10px;

    font-weight:600;
}

.title{

    text-align:center;

    font-family:'Playfair Display',serif;

    font-size:36px;

    margin-bottom:10px;
}

.desc{

    text-align:center;

    color:var(--muted);

    margin-bottom:40px;
}

.form-group{

    margin-bottom:20px;
}

label{

    display:block;

    margin-bottom:8px;

    font-weight:600;
}

input,
select{

    width:100%;

    padding:14px 16px;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:15px;
}

.btn{

    width:100%;

    margin-top:20px;

    background:var(--primary);

    color:white;

    border:none;

    padding:16px;

    border-radius:14px;

    cursor:pointer;

    font-size:16px;

    font-weight:600;
}

.progress{

    width:100%;

    height:8px;

    background:#eee;

    border-radius:20px;

    margin-bottom:30px;

    overflow:hidden;
}

.progress-fill{

    width:66%;

    height:100%;

    background:var(--primary);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
MATCHU
</div>

<div class="step">
STEP 2 OF 3
</div>

<div class="progress">
<div class="progress-fill"></div>
</div>

<div class="title">
Your Match Preferences
</div>

<div class="desc">
Help us find people who truly align with your life goals.
</div>

<form>

<div class="form-group">
<label>University / Alma Mater</label>
<input type="text" placeholder="Example: Universitas Indonesia">
</div>

<div class="form-group">
<label>Major</label>
<input type="text" placeholder="Example: Medicine">
</div>

<div class="form-group">
<label>Profession</label>
<input type="text" placeholder="Example: Doctor">
</div>

<div class="form-group">
<label>City of Residence</label>
<input type="text" placeholder="Example: Jakarta">
</div>

<div class="form-group">
<label>Religion</label>
<select>
<option>Select Religion</option>
<option>Islam</option>
<option>Christian</option>
<option>Catholic</option>
<option>Hindu</option>
<option>Buddhist</option>
<option>Confucian</option>
</select>
</div>

<div class="form-group">
<label>Marital Status</label>
<select>
<option>Select</option>
<option>Never Married</option>
<option>Divorced</option>
<option>Widowed</option>
</select>
</div>

<div class="form-group">
<label>Marriage Timeline</label>
<select>
<option>Select</option>
<option>Within 1 Year</option>
<option>1-2 Years</option>
<option>2-3 Years</option>
<option>Flexible</option>
</select>
</div>

<button class="btn">
Continue
</button>

</form>

</div>

</div>

</body>
</html>
