<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verifikasi Email | Matchu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#7A2236;
    --bg:#F8F5F2;
    --muted:#6B7280;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.card{

    width:100%;
    max-width:650px;

    background:white;

    border-radius:30px;

    padding:60px;

    text-align:center;

    box-shadow:
    0 20px 50px rgba(0,0,0,.05);
}

.logo{

    font-family:'Playfair Display',serif;

    font-size:64px;

    color:#7A2236;

    margin-bottom:10px;
}

.tagline{

    color:#7A2236;

    font-style:italic;

    margin-bottom:40px;
}

.icon{

    font-size:70px;

    margin-bottom:25px;
}

.title{

    font-family:'Playfair Display',serif;

    font-size:40px;

    margin-bottom:15px;
}

.desc{

    color:var(--muted);

    line-height:1.8;

    margin-bottom:35px;
}

.email-box{

    background:#f9f4f5;

    padding:18px;

    border-radius:14px;

    margin-bottom:30px;

    font-weight:600;

    color:#7A2236;
}

.otp-container{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-bottom:30px;
}

.otp{

    width:60px;

    height:60px;

    border:1px solid #ddd;

    border-radius:14px;

    text-align:center;

    font-size:24px;

    font-weight:700;
}

.btn{

    width:100%;

    padding:16px;

    border:none;

    border-radius:14px;

    background:#7A2236;

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;
}

.btn:hover{

    opacity:.9;
}

.resend{

    display:block;

    margin-top:20px;

    text-decoration:none;

    color:#7A2236;

    font-weight:600;
}

.note{

    margin-top:25px;

    color:#888;

    font-size:13px;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
MATCHU
</div>

<div class="tagline">
Beyond Matching. Toward Marriage.
</div>

<div class="icon">
📧
</div>

<div class="title">
Verifikasi Email
</div>

<div class="desc">

Kami telah mengirimkan kode verifikasi 6 digit ke alamat email Anda.

Masukkan kode tersebut untuk melanjutkan proses pendaftaran.

</div>

<div class="email-box">

contoh@email.com

</div>

<div class="otp-container">

<input class="otp" maxlength="1">
<input class="otp" maxlength="1">
<input class="otp" maxlength="1">
<input class="otp" maxlength="1">
<input class="otp" maxlength="1">
<input class="otp" maxlength="1">

</div>

<button class="btn">

Verifikasi Email

</button>

<a href="#" class="resend">

Kirim Ulang Kode

</a>

<div class="note">

Kode berlaku selama 10 menit.

</div>

</div>

</body>
</html>
