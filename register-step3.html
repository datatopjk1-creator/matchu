```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matchu - Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#7A2236;
    --bg:#F8F5F2;
    --card:#fff;
    --text:#222;
    --muted:#6B7280;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
}

.container{
    max-width:700px;
    margin:60px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:28px;
    padding:50px;
    box-shadow:0 20px 40px rgba(0,0,0,.05);
}

.logo{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:58px;
    color:var(--primary);
    margin-bottom:10px;
}

.step{
    text-align:center;
    color:var(--primary);
    font-weight:600;
    margin-bottom:12px;
}

.progress{
    height:8px;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:35px;
}

.progress-fill{
    width:100%;
    height:100%;
    background:var(--primary);
}

.title{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:36px;
    margin-bottom:10px;
}

.desc{
    text-align:center;
    color:var(--muted);
    margin-bottom:40px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px 16px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

.optional{
    color:var(--muted);
    font-size:13px;
    font-weight:400;
}

.notice{
    background:#f9f4f5;
    border-left:4px solid var(--primary);
    padding:16px;
    border-radius:12px;
    margin-bottom:25px;
    color:#555;
    line-height:1.6;
}

.check-group{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-top:25px;
}

.check-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
}

.check-item input{
    width:auto;
    margin-top:3px;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:var(--primary);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:30px;
}

.btn:hover{
    opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
MATCHU
</div>

<div class="step">
STEP 3 OF 3
</div>

<div class="progress">
<div class="progress-fill"></div>
</div>

<div class="title">
Verification & Review
</div>

<div class="desc">
Help us maintain a high-quality and trusted matchmaking community.
</div>

<div class="notice">

<strong>Education Verified</strong> is required for all members.

<strong>Professional Verified</strong> is optional and can be requested later through your profile settings.

</div>

<form action="waiting-review.html">

<div class="form-group">
<label>Instagram Username *</label>
<input
type="text"
placeholder="@username"
required>
</div>

<div class="form-group">
<label>
LinkedIn Profile
<span class="optional">(Optional)</span>
</label>

<input
type="url"
placeholder="https://linkedin.com/in/yourprofile">
</div>

<div class="check-group">

<label class="check-item">
<input type="checkbox" required>
<span>
I confirm that my education information is accurate.
</span>
</label>

<label class="check-item">
<input type="checkbox" required>
<span>
I am joining Matchu for a serious relationship and future marriage.
</span>
</label>

<label class="check-item">
<input type="checkbox" required>
<span>
I agree to Matchu Terms of Service and Privacy Policy.
</span>
</label>

</div>

<button class="btn">
Complete Registration
</button>

</form>

</div>

</div>

</body>
</html>
```
